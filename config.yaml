# Paper Tracker config
storage:
  enabled: true
  content_storage_enabled: true
  keep_arxiv_version: false

search:
  sources: [arxiv]
  max_results: 3
  pull_every: 7
  fill_enabled: true
  max_lookback_days: 30

queries:
  - NAME: Deep Learning
    OR:
      - deep learning
      - neural network
    NOT:
      - survey
    CATEGORY:
      OR:
        - cs.LG
        - cs.CV

  - NAME: LLM Research
    OR:
      - large language model
      - LLM
    NOT:
      - law
      - legal
    CATEGORY:
      OR:
        - cs.CL
        - cs.AI

output:
  base_dir: docs/
  formats: [console, markdown, html, email]

llm:
  enabled: true
  enable_translation: true
  enable_summary: true
  target_lang: Simplified Chinese
  
  provider: openai-compat
  base_url: https://api.deepseek.com
  model: deepseek-chat

notification:
  email:
    enabled: true
    smtp_host: smtp.qq.com
    smtp_port: 465
    smtp_ssl: true
    to: 934750742@qq.com           # 使用环境变量
    from: 934750742@qq.com      # 使用环境变量
