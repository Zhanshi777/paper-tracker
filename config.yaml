# Paper Tracker config
storage:
  enabled: true
  content_storage_enabled: true
  keep_arxiv_version: false

search:
  sources: [arxiv]
  max_results: 3
  pull_every: 7
  fill_enabled: true
  max_lookback_days: 30

queries:
  - NAME: Perovskite Solar Cell
    OR:
      - "perovskite solar cell"
      - "perovskite photovoltaic"
      - "perovskite photovoltaics"
      - "perovskite solar"
    AND:
      - perovskite
    NOT:
      - review
      - perspective
      - LED
      - "light-emitting diode"
      - photoluminescence
      - laser
    CATEGORY:
      OR:
        - cond-mat.mtrl-sci
        - physics.chem-ph

  - NAME: Perovskite Efficiency
    OR:
      - "power conversion efficiency"
      - "certified efficiency"
      - "high efficiency perovskite"
    AND:
      - perovskite
    NOT:
      - review
    CATEGORY:
      OR:
        - cond-mat.mtrl-sci
        - physics.chem-ph

output:
  base_dir: docs/
  formats: [console, markdown, html]   # 移除 email

llm:
  enabled: true
  enable_translation: true
  enable_summary: true
  target_lang: Simplified Chinese
  
  provider: openai-compat
  base_url: https://api.deepseek.com 
  model: deepseek-chat

notification:
  email:
    enabled: true
    smtp_host: smtp.qq.com
    smtp_port: 465
    smtp_ssl: true
    to: 934750742@qq.com
    from: 934750742@qq.com
