name: Daily ArXiv Tracker

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'config.yaml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  track-papers:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run paper tracker
      env:
        OPENAI_COMPAT_API_KEY: ${{ secrets.OPENAI_COMPAT_API_KEY }}
        OPENAI_COMPAT_API_BASE: ${{ vars.OPENAI_COMPAT_API_BASE }}
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        EMAIL_TO: ${{ vars.EMAIL_TO }}
        EMAIL_SENDER: ${{ vars.EMAIL_SENDER }}
        SMTP_HOST: ${{ vars.SMTP_HOST }}
        SMTP_PORT: ${{ vars.SMTP_PORT }}
        SMTP_USER: ${{ vars.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
      run: |
        python -m PaperTracker search --config config.yaml
        
    - name: Check docs structure
      run: |
        echo "=== Docs directory ==="
        ls -la docs/ || echo "No docs dir"
        echo "=== HTML directory ==="
        ls -la docs/html/ || echo "No html dir"
        
    - name: Create index.html
      run: |
        cat > docs/index.html << 'EOF'
        <!DOCTYPE html>
        <html>
        <head>
            <meta http-equiv="refresh" content="0; url=html/">
            <title>Paper Tracker</title>
        </head>
        <body>
            <h1>Paper Tracker</h1>
            <p><a href="html/">View Papers</a></p>
        </body>
        </html>
        EOF
        echo "=== Created index.html ==="
        ls -la docs/index.html
        
    - name: Setup Pages
      uses: actions/configure-pages@v5
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './docs'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
